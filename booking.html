<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Ticket - GURUKRUPA TOURS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>GURUKRUPA TOURS</h1>
<p>Book Your Ticket</p>
</header>

<div class="booking">

<h2>Journey Details</h2>

<label>From</label>
<select id="from">
<option>Jaysingpur</option>
<option>Kolhapur</option>
</select>

<label>To</label>
<select id="to">
<option>Pune</option>
<option>Mumbai</option>
</select>

<label>Date</label>
<input type="date" id="date">

<label>Passengers</label>
<select id="passengers">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<button id="continueBtn">Continue</button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
